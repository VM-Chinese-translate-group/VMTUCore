name: Sync `metadata.json` File

on:
  schedule:
    # 每小时运行一次
    - cron: "0 * * * *"

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download `metadata.json` file
        run: |
          mkdir -p temp

          curl -L \
            https://raw.githubusercontent.com/VM-Chinese-translate-group/VM-Resources/refs/heads/main/resourcepack/metadata.json \
            -o temp/upstream.json

      - name: Compare file hash
        id: compare
        run: |
          if [ ! -f resourcepack/src/main/resources/metadata.json ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          LOCAL_HASH=$(sha256sum resourcepack/src/main/resources/metadata.json | cut -d ' ' -f1)
          UPSTREAM_HASH=$(sha256sum temp/upstream.json | cut -d ' ' -f1)

          echo "Local:    $LOCAL_HASH"
          echo "Upstream: $UPSTREAM_HASH"

          if [ "$LOCAL_HASH" != "$UPSTREAM_HASH" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Replace local file
        if: steps.compare.outputs.changed == 'true'
        run: |
          cp temp/upstream.json resourcepack/src/main/resources/metadata.json

      - name: Create Pull Request
        if: steps.compare.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

          branch: sync-metadata

          delete-branch: true

          commit-message: |
            chore: sync `metadata.json` file

          title: |
            chore: sync `metadata.json` file

          body: |
            Automated sync from [VM-Chinese-translate-group/VM-Resources](https://github.com/VM-Chinese-translate-group/VM-Resources) repository.

            This PR was created automatically by GitHub Actions.

          add-paths: |
            resourcepack/src/main/resources/metadata.json